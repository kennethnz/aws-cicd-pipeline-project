<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Production CI/CD Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="icon-header">🚀</div>
            <h1>Deployment Successful</h1>
            <h1>Trial 1</h1>
            <p class="description">
                Your application has been synchronized and deployed automatically via 
                <span class="highlight">AWS CodePipeline</span>.
            </p>
            
            <div class="status-container">
                <div class="status-box">
                    <span class="pulse"></span>
                    <span class="status-text">System Status: <strong class="live">LIVE</strong></span>
                </div>
            </div>

            <footer>
                <p>&copy; Created by Kenneth</p>
            </footer>
        </div>
    </main>
</body>
</html>
